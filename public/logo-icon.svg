  <circle cx="58" cy="100" r="3.5" fill="#D44A1E" opacity="0.55"/>
  <!-- Connecting spokes (faint) -->
  <line x1="100" y1="87" x2="100" y2="62" stroke="#D44A1E" stroke-width="0.8" opacity="0.25"/>
  <line x1="113" y1="100" x2="138" y2="100" stroke="#D44A1E" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="113" x2="100" y2="138" stroke="#D44A1E" stroke-width="0.8" opacity="0.25"/>
  <line x1="87" y1="100" x2="62" y2="100" stroke="#D44A1E" stroke-width="0.8" opacity="0.25"/>
</svg>
