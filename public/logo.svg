<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 283 54" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;display=swap');</style>
  </defs>
  <!-- Neural mark (4 rings + dot) -->
  <circle cx="27" cy="27" r="24" stroke="#44E5C0" stroke-width="0.8" opacity="0.18"/>
  <circle cx="27" cy="27" r="19" stroke="#44E5C0" stroke-width="1.2" opacity="0.38"/>
  <circle cx="27" cy="27" r="13" stroke="#44E5C0" stroke-width="1.6" opacity="0.72"/>
  <circle cx="27" cy="27" r="4.5" fill="#44E5C0"/>
  <!-- Separator rule -->
  <line x1="57" y1="11" x2="57" y2="43" stroke="#44E5C0" stroke-width="0.8" opacity="0.22"/>
  <!-- Wordmark: automation -->
  <text x="68" y="32"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="21" font-weight="400"
    fill="#F1ECDC" letter-spacing="-0.3">automation</text>
  <!-- Wordmark: / (accent, bold) -->
  <text x="196" y="32"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="21" font-weight="700"
    fill="#44E5C0">/</text>
  <!-- Wordmark: diary -->
  <text x="208" y="32"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="21" font-weight="400"
    fill="#F1ECDC">diary</text>
  <!-- Thin baseline rule -->
  <line x1="68" y1="42" x2="270" y2="42" stroke="#44E5C0" stroke-width="0.5" opacity="0.18"/>
</svg>
