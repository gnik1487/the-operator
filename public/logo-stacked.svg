<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;display=swap');</style>
  </defs>
  <!-- Background -->
  <rect width="360" height="240" fill="#06080F"/>
  <!-- Subtle grid texture lines -->
  <line x1="0" y1="60" x2="360" y2="60" stroke="#44E5C0" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="120" x2="360" y2="120" stroke="#44E5C0" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="180" x2="360" y2="180" stroke="#44E5C0" stroke-width="0.3" opacity="0.06"/>
  <line x1="90" y1="0" x2="90" y2="240" stroke="#44E5C0" stroke-width="0.3" opacity="0.06"/>
  <line x1="180" y1="0" x2="180" y2="240" stroke="#44E5C0" stroke-width="0.3" opacity="0.06"/>
  <line x1="270" y1="0" x2="270" y2="240" stroke="#44E5C0" stroke-width="0.3" opacity="0.06"/>
  <!-- Neural mark centered -->
  <circle cx="180" cy="80" r="50" stroke="#44E5C0" stroke-width="1" opacity="0.18"/>
  <circle cx="180" cy="80" r="36" stroke="#44E5C0" stroke-width="1.5" opacity="0.4"/>
  <circle cx="180" cy="80" r="24" stroke="#44E5C0" stroke-width="2" opacity="0.72"/>
  <circle cx="180" cy="80" r="7.5" fill="#44E5C0"/>
  <!-- Divider rule -->
  <line x1="60" y1="148" x2="300" y2="148" stroke="#44E5C0" stroke-width="0.6" opacity="0.25"/>
  <!-- "automation" centered -->
  <text x="180" y="176"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="22" font-weight="400"
    fill="#F1ECDC" text-anchor="middle" letter-spacing="-0.3">automation</text>
  <!-- "/diary" centered, "/" in cyan -->
  <text x="180" y="206"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="22" font-weight="700"
    fill="#44E5C0" text-anchor="middle">/diary</text>
</svg>
